info:
  name: Create Bike
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/bikes
  body:
    type: json
    data: |-
      {
        "model": "Caloi Elite 2",
        "brand": "Caloi",
        "year": 2026,
        "dailyRate": 10.99,
        "weeklyRate": 29.99,
        "monthlyRate": 49.99
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
